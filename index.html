<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfTechLabs | Under Construction</title>
    
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="shortcut icon" href="logo.svg">

    <style>
        :root {
            --bg-color: #0b0e14;
            --text-primary: #f0f0f0;
            --accent-color: #630d8a; 
            --accent-hover: #7b11aa;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            padding: 2rem 2rem 5rem 2rem;
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 80%;
            max-width: 300px;
            max-height: 35vh;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(99, 13, 138, 0.4));
            flex-shrink: 1;
        }

        h1 {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .status {
            color: var(--accent-color);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
        }

        p {
            color: #aaa;
            max-width: 600px;
            margin: 0.5rem 0;
        }

        .contact-box {
            margin-top: 2rem;
            width: 100%;
            max-width: 400px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 0.8rem;
            border-radius: 5px;
            border: 1px solid #333;
            background: #1a1f26;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 5px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.svg" alt="WolfTechLabs Logo" class="logo">
        <h1>WolfTechLabs</h1>
        <p class="status">SITE UNDER CONSTRUCTION</p>
        <p>We are currently building our digital workshop.</p>
        
        <div class="contact-box">
            <p style="margin-bottom: 1.5rem;">For custom 3D printing orders and inquiries:</p>
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="c0c6138a-e33b-46d5-bc5d-37b34c79f907">
                
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Describe your 3D printing project..." rows="4" required></textarea>
                
                <button type="submit">Send WolfTechLabs Inquiry</button>
            </form>
            <p style="font-size: 0.8rem; margin-top: 1.5rem;">
                Or email directly: <a href="mailto:wolftechlabs@gmail.com">wolftechlabs@gmail.com</a>
            </p>
        </div>
    </div>
</body>
</html>
