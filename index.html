<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Tech Labs | Under Construction</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-primary: #f0f0f0;
            --accent-color: #9b4dff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; /* Prevents horizontal scroll on zoom */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 80%;
            max-width: 300px;
            max-height: 35vh; /* Prevents logo from pushing text off-screen */
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(155, 77, 255, 0.2));
            flex-shrink: 1; /* Allows logo to shrink before text gets cut off */
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 2.5rem); /* Scales text fluidly */
            margin-bottom: 0.5rem;
        }

        p {
            color: #888;
            max-width: 600px;
            margin: 0.5rem 0;
        }

        .contact-box {
            margin-top: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.svg" alt="Wolf Tech Labs Logo" class="logo">
        <h1>Wolf Tech Labs</h1>
        <p class="status">SITE UNDER CONSTRUCTION</p>
        <p>We are currently building our digital workshop.</p>
        <div class="contact-box">
            <p>For custom 3D printing orders and inquiries:</p>
            <p>Email: <a href="mailto:your-wolftechlabs@gmail.com">your-email@example.com</a></p>
        </div>
    </div>
</body>
</html>
