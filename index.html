<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Tech Labs | Under Construction</title>
    <style>
        body {
            background-color: #121212; /* Deep Black/Grey */
            color: #e0e0e0; /* Off-white text for readability */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo {
            max-width: 250px;
            margin-bottom: 20px;
            border: 2px solid #444; /* Placeholder border */
        }

        h1 {
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            color: #ff9800; /* Construction Orange */
            font-weight: bold;
            margin-bottom: 30px;
        }

        .contact-box {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid #444;
        }

        a {
            color: #03a9f4;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace 'logo.png' with your actual logo file name later -->
        <img src="logo.svg" alt="Wolf Tech Labs Logo" class="logo">
        
        <h1>Wolf Tech Labs</h1>
        <p class="status">SITE UNDER CONSTRUCTION</p>
        
        <p>We are currently building our digital workshop.</p>
        
        <div class="contact-box">
            <p>For custom 3D printing orders and inquiries:</p>
            <p>Email: <a href="mailto:your-email@example.com">your-email@example.com</a></p>
        </div>
    </div>

</body>
</html>
