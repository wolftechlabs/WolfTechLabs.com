<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfTechLabs | Under Construction</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --text-primary: #f0f0f0;
            --accent-color: #9b4dff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden; /* Prevents horizontal scroll on zoom */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; 
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            width: 80%;
            max-width: 300px;
            max-height: 35vh; /* Prevents logo from pushing text off-screen */
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(155, 77, 255, 0.2));
            flex-shrink: 1; /* Allows logo to shrink before text gets cut off */
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 2.5rem); /* Scales text fluidly */
            margin-bottom: 0.5rem;
        }

        p {
            color: #888;
            max-width: 600px;
            margin: 0.5rem 0;
        }

        .contact-box {
            margin-top: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
   <div class="container">
        <img src="logo.svg" alt="Wolf Tech Labs Logo" class="logo">
        
        <h1>Wolf Tech Labs</h1>
        <p class="status">SITE UNDER CONSTRUCTION</p>
        
        <p>We are currently building our digital workshop.</p>
        
        <div class="contact-box">
    <p>For custom 3D printing orders and inquiries:</p>
    
    <form action="https://api.web3forms.com/submit" method="POST" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
        
        <input type="hidden" name="access_key" value="c0c6138a-e33b-46d5-bc5d-37b34c79f907">
        
        <input type="text" name="name" placeholder="Your Name" required 
            style="padding: 12px; border-radius: 5px; border: 1px solid #333; background: #1a1f26; color: white; font-size: 1rem;">
        
        <input type="email" name="email" placeholder="Your Email" required 
            style="padding: 12px; border-radius: 5px; border: 1px solid #333; background: #1a1f26; color: white; font-size: 1rem;">
        
        <textarea name="message" placeholder="Describe your 3D printing project..." rows="4" required 
            style="padding: 12px; border-radius: 5px; border: 1px solid #333; background: #1a1f26; color: white; font-size: 1rem; resize: none;"></textarea>
        
        <button type="submit" 
            style="padding: 15px; border-radius: 5px; border: none; background: var(--accent-color); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: transform 0.2s;">
            Send WolfTechLabs Inquiry
        </button>
    </form>
</div>
    </div>
</body>
</html>
