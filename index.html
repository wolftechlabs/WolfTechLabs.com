<!DOCTYPE html>
<html lang="en">
<head>

    <title>Wolf Tech Labs | Under Construction</title>
    <style>
      /* Update your main container styles */
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden; /* Prevents horizontal shift */
}

.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100dvh; /* Use dynamic viewport height for mobile browsers */
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
}

img {
    max-width: 80%;      /* Ensures logo doesn't overflow horizontally */
    max-height: 50vh;    /* Prevents logo from pushing text off-screen */
    height: auto;        /* Maintains aspect ratio */
    margin-bottom: 2rem;
}

.logo {
    /* This makes the logo "Fluid" */
    width: 100%; 
    max-width: 300px; /* It will be 300px unless the screen is smaller */
    height: auto;
    margin-bottom: 20px;
}
        }

        h1 {
            color: #ffffff;

            margin-bottom: 30px;
        }

        .contact-box {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid #444;

            text-decoration: underline;

</head>
