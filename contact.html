<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | WolfTechLabs</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <style>
        :root {
            --bg-color: #020203; 
            --text-color: #c9d1d9;
            --wolf-purple: #390039;
            --wolf-glow: rgba(57, 0, 57, 1);
            --card-bg: #0d1117; 
            --highlight: #b666d2; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .logo-container img {
            width: 100%;
            max-width: 180px; /* Smaller for sub-pages */
            height: auto;
            filter: drop-shadow(0 0 10px var(--wolf-glow));
            margin-bottom: 20px;
        }

        h1 { color: #ffffff; margin-bottom: 30px; }

        .form-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            border: 2px solid var(--wolf-purple);
            box-sizing: border-box;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: var(--bg-color);
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--wolf-purple);
            color: white;
            border: 1px solid var(--highlight);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: var(--highlight); }

        .back-link {
            margin-top: 30px;
            color: var(--highlight);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="index.html"><img src="logo.svg" alt="WolfTechLabs Logo"></a>
    </div>

    <h1>Project Inquiry</h1>

    <div class="form-container">
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" rows="8" placeholder="Tell us about your project (Materials, dimensions, or STL links)..." required></textarea>
            <button type="submit">Submit Inquiry</button>
        </form>
    </div>

    <a href="index.html" class="back-link">← Return to Homepage</a>

</body>
</html>
