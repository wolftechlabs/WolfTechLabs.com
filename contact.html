<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | WolfTechLabs</title>
    
    <link rel="icon" type="image/svg+xml" href="logo.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #020203; 
            --text-color: #c9d1d9;
            --wolf-purple: #390039;
            --wolf-glow: rgba(57, 0, 57, 1);
            --card-bg: #0d1117; 
            --highlight: #b666d2; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .logo-container img {
            width: 100%;
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--wolf-glow));
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ffffff; 
            margin-bottom: 30px; 
            letter-spacing: 2px;
            font-size: 2rem;
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            border: 2px solid var(--wolf-purple);
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: var(--bg-color);
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--highlight);
            box-shadow: 0 0 8px var(--wolf-glow);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--wolf-purple);
            color: white;
            border: 1px solid var(--highlight);
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button:hover { 
            background-color: var(--highlight); 
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 40px;
            color: var(--highlight);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        
        .back-link:hover { color: #ffffff; }
    </style>
</head>
<body>

    <div class="logo-container">
        <a href="index.html"><img src="logo.svg" alt="WolfTechLabs Logo"></a>
    </div>

    <h1>Project Inquiry</h1>

    <div class="form-container">
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="c0c6138a-e33b-46d5-bc5d-37b34c79f907">
            
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" rows="8" placeholder="Tell us about your project requirements (Materials, quantities, or links to STL files)..." required></textarea>
            
            <button type="submit">Submit Inquiry</button>
        </form>
    </div>

    <a href="index.html" class="back-link">← BACK TO HOMEPAGE</a>

</body>
</html>
